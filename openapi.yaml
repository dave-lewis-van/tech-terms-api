openapi: 3.1.0
info:
  title: Technical Terms API
  description: A centralized programmatic 'Source of Truth' for technical terminology
    used in documentation engineering.
  version: 1.0.0
paths:
  /terms:
    get:
      tags:
      - Glossary Management
      summary: Get Terms
      description: Retrieve a list of technical terms with optional filtering.
      operationId: get_terms_terms_get
      parameters:
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TermCategory'
          - type: 'null'
          description: Filter terms by technical domain.
          title: Category
        description: Filter terms by technical domain.
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search terms and definitions by keyword.
          title: Search
        description: Search terms and definitions by keyword.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GlossaryTerm'
                title: Response Get Terms Terms Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Glossary Management
      summary: Create Term
      description: Register a new technical term in the glossary.
      operationId: create_term_terms_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlossaryTerm'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /terms/{id}:
    get:
      tags:
      - Glossary Management
      summary: Get Term
      description: Fetch a specific term by its ID.
      operationId: get_term_terms__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: The unique numeric ID of the glossary term.
          title: Id
        description: The unique numeric ID of the glossary term.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    GlossaryTerm:
      properties:
        id:
          type: integer
          title: Id
          example: 101
        term:
          type: string
          title: Term
          description: The canonical name of the technical concept.
          example: Hydration
        definition:
          type: string
          title: Definition
          description: A concise, technical explanation of the term.
          example: The process of attaching event listeners to static HTML.
        category:
          $ref: '#/components/schemas/TermCategory'
          example: frontend
        see_also:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: See Also
          description: IDs of related glossary entries.
          example:
          - 105
          - 202
      type: object
      required:
      - id
      - term
      - definition
      - category
      title: GlossaryTerm
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    TermCategory:
      type: string
      enum:
      - frontend
      - backend
      - devops
      - docs-as-code
      title: TermCategory
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
